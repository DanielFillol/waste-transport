services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres-1
      POSTGRES_PASSWORD: postgres-1
      POSTGRES_DB: waste_test_db
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres-1 -d waste_test_db"]
      interval: 3s
      timeout: 5s
      retries: 15

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_USER: postgres-1
      DB_PASS: postgres-1
      DB_NAME: waste_test_db
      JWT_SECRET: test-secret-for-e2e-tests
      JWT_EXPIRATION_HOURS: 8
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o
      APP_ENV: test
    depends_on:
      postgres-test:
        condition: service_healthy
